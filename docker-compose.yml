name: sinaliza-chat-aviso

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/juancjc/sinaliza-chat-aviso:latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5488}:80"
    environment:
      APP_NAME: ${APP_NAME:-Chat Aviso}
      APP_ENV: production
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:5488}
      APP_LOCALE: ${APP_LOCALE:-pt_BR}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pt_BR}
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/storage/app/database.sqlite}
      DB_USERNAME: ${DB_USERNAME:-chat_aviso}
      DB_PASSWORD: ${DB_PASSWORD:-chat_aviso}
      DB_SSLMODE: ${DB_SSLMODE:-prefer}
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      QUEUE_CONNECTION: database
      QUEUE_WORKERS: ${QUEUE_WORKERS:-1}
      QUEUE_NAMES: ${QUEUE_NAMES:-default}
      QUEUE_SLEEP: ${QUEUE_SLEEP:-1}
      QUEUE_TRIES: ${QUEUE_TRIES:-3}
      QUEUE_TIMEOUT: ${QUEUE_TIMEOUT:-120}
      QUEUE_MAX_TIME: ${QUEUE_MAX_TIME:-3600}
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: sinaliza-chat-aviso
      REVERB_APP_KEY: sinaliza-chat-aviso-key
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-}
      REVERB_HOST: 127.0.0.1
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      MAIL_API_URL: ${MAIL_API_URL:-https://nest.juancjc.com.br/api-nest-central-jc/mail/send}
      MAIL_API_KEY: ${MAIL_API_KEY:-}
      MAIL_API_TOKEN: ${MAIL_API_TOKEN:-}
      MAIL_API_TIMEOUT: ${MAIL_API_TIMEOUT:-15}
    volumes:
      - app_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  app_storage:
